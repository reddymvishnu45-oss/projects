<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background-color: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .result {
            margin-top: 20px;
        }

        a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .copy-btn {
            margin-top: 10px;
            background-color: #48bb78;
        }

        .copy-btn:hover {
            background-color: #38a169;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔗 URL Shortener</h2>

        <form method="POST">
            <input type="text" name="url" placeholder="Enter Long URL" required>
            <br>
            <button type="submit">Shorten</button>
        </form>

        {% if short_url %}
        <div class="result">
            <p>Short URL:</p>
            <a href="{{short_url}}" target="_blank">{{short_url}}</a>
            <br>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('{{short_url}}')">
                Copy
            </button>
        </div>
        {% endif %}
    </div>
</body>
</html>
